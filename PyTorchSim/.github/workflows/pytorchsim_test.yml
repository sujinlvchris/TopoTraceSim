name: PyTorchSim Tests

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      vector_lane:
        description: "Vector lane size (use empty string for server TPU)"
        required: true
        type: number
      spad_size:
        description: "SPAD size (use empty string for server TPU)"
        required: true
        type: number

jobs:
  test_add:
    name: Run test_add.py
    runs-on: self-hosted
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run test_add.py
        run: |
          echo "Running test_add.py"
          docker run --rm \
            -e vpu_num_lanes="${{ inputs.vector_lane }}" \
            -e vpu_spad_size_kb_per_lane="${{ inputs.spad_size }}" \
            ${{ inputs.image_name }} python3 PyTorchSim/tests/test_add.py

  test_transcendental:
